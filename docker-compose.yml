services:

  # ──────────────────────────────────────────────
  # DATABASES (no host ports — internal network only)
  # ──────────────────────────────────────────────
  mongodb:
    image: mongo:7.0.5
    container_name: mongodb
    # No host port — accessed by container name 'mongodb' within Docker network
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: pass
      MONGO_INITDB_DATABASE: product-service
    volumes:
      - mongodb-data:/data/db
    networks:
      - microservices-net

  mysql-order:
    image: mysql:8.3.0
    container_name: mysql-order
    # No host port — accessed by container name 'mysql-order' within Docker network
    environment:
      MYSQL_ROOT_PASSWORD: pass
    volumes:
      - mysql-order-data:/var/lib/mysql
      - ./order-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - microservices-net

  mysql-inventory:
    image: mysql:8.3.0
    container_name: mysql-inventory
    # No host port — accessed by container name 'mysql-inventory' within Docker network
    environment:
      MYSQL_ROOT_PASSWORD: pass
    volumes:
      - mysql-inventory-data:/var/lib/mysql
      - ./inventory-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - microservices-net

  mysql-keycloak:
    image: mysql:8.3.0
    container_name: mysql-keycloak
    # No host port — only keycloak container connects to this
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: keycloak
      MYSQL_USER: keycloak
      MYSQL_PASSWORD: pass
    volumes:
      - mysql-keycloak-data:/var/lib/mysql
    networks:
      - microservices-net

  # ──────────────────────────────────────────────
  # KEYCLOAK
  # ──────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    command: ["start-dev", "--import-realm"]
    ports:
      - "8181:8080"
    environment:
      DB_VENDOR: MYSQL
      DB_ADDR: mysql-keycloak
      DB_DATABASE: keycloak
      DB_USER: keycloak
      DB_PASSWORD: pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./api-gateway/docker/keycloak/realms/:/opt/keycloak/data/import/
    depends_on:
      - mysql-keycloak
    networks:
      - microservices-net

  # ──────────────────────────────────────────────
  # KAFKA
  # ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    # No host port — only the broker connects to this
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - microservices-net

  broker:
    image: confluentinc/cp-kafka:7.5.0
    container_name: broker
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - microservices-net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    ports:
      - "8085:8081"
    depends_on:
      - broker
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: broker:29092
      SCHEMA_REGISTRY_LISTENERS: http://schema-registry:8081
    networks:
      - microservices-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8086:8080"
    depends_on:
      - broker
      - schema-registry
    environment:
      KAFKA_CLUSTERS_NAME: local
      KAFKA_CLUSTERS_BOOTSTRAPSERVERS: broker:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - microservices-net

  # ──────────────────────────────────────────────
  # OBSERVABILITY STACK
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - microservices-net

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - microservices-net

  tempo:
    image: grafana/tempo:2.2.0
    container_name: tempo
    command: -config.file=/etc/tempo.yml
    ports:
      - "3200:3200"
      - "9411:9411"
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo.yml
    networks:
      - microservices-net

  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./docker/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - microservices-net

  # ──────────────────────────────────────────────
  # MICROSERVICES
  # ──────────────────────────────────────────────
  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://root:pass@mongodb:27017/product-service?authSource=admin
    depends_on:
      - mongodb
      - tempo
      - loki
    networks:
      - microservices-net

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-inventory:3306/inventory_service
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: pass
    depends_on:
      - mysql-inventory
      - tempo
      - loki
    networks:
      - microservices-net

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-order:3306/order_service
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: broker:29092
      INVENTORY_URL: http://inventory-service:8082
    depends_on:
      - mysql-order
      - broker
      - inventory-service
      - tempo
      - loki
    networks:
      - microservices-net

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8083:8083"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: broker:29092
    depends_on:
      - broker
      - tempo
      - loki
    networks:
      - microservices-net

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "9000:9000"
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/spring-microservices-security-realm
    depends_on:
      - keycloak
      - product-service
      - order-service
      - inventory-service
      - notification-service
      - tempo
      - loki
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge

volumes:
  mongodb-data:
  mysql-order-data:
  mysql-inventory-data:
  mysql-keycloak-data:

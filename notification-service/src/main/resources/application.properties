spring.application.name=notification-service
server.port=8083
#kafka consumer
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notificationService
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.berkayd.microservices.notification_service.order.event.OrderPlacedEvent

spring.mail.username=username
spring.mail.host=mailhost
spring.mail.port=port
spring.mail.password=password

management.endpoints.web.exposure.include=prometheus
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://tempo:9411/api/v2/spans